<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<title>Telèfon Antic</title>

<style>
body {
  background: radial-gradient(circle, #2b1d0e, #000);
  color: #f2e6c9;
  font-family: "Courier New", monospace;
  text-align: center;
}

.phone {
  width: 320px;
  margin: 40px auto;
  padding: 25px;
  background: #1a1a1a;
  border-radius: 25px;
  box-shadow: inset 0 0 20px black;
}

#screen {
  background: #000;
  padding: 15px;
  margin-bottom: 20px;
  font-size: 26px;
  letter-spacing: 8px;
  min-height: 30px;
}

.keypad {
  display: grid;
  grid-template-columns: repeat(3, 90px);
  gap: 12px;
  justify-content: center;
}

button {
  height: 90px;
  font-size: 22px;
  border-radius: 50%;
  background: radial-gradient(circle, #444, #111);
  color: #f2e6c9;
  border: 2px solid #888;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>☎️ TELEFON</h1>

<div class="phone">
  <div id="screen"></div>

  <div class="keypad">
    <button onmousedown="dial('1')">1</button>
    <button onmousedown="dial('2')">2</button>
    <button onmousedown="dial('3')">3</button>
    <button onmousedown="dial('4')">4</button>
    <button onmousedown="dial('5')">5</button>
    <button onmousedown="dial('6')">6</button>
    <button onmousedown="dial('7')">7</button>
    <button onmousedown="dial('8')">8</button>
    <button onmousedown="dial('9')">9</button>
    <button onclick="clearInput()">C</button>
    <button onmousedown="dial('0')">0</button>
    <button onclick="checkCode()">✔</button>
  </div>
</div>

<audio id="player"></audio>

<!-- sons -->
<audio id="clickSound" src="https://assets.mixkit.co/sfx/preview/mixkit-light-button-2580.mp3"></audio>
<audio id="returnSound" src="https://assets.mixkit.co/sfx/preview/mixkit-gear-metal-click-1124.mp3"></audio>
<audio id="beepSound" src="https://assets.mixkit.co/sfx/preview/mixkit-classic-short-beep-3059.mp3"></audio>

<script>
let input = "";
const screen = document.getElementById("screen");

const clickSound = document.getElementById("clickSound");
const returnSound = document.getElementById("returnSound");
const beepSound = document.getElementById("beepSound");
const player = document.getElementById("player");

function vibrate(ms = 40){
  if(navigator.vibrate) navigator.vibrate(ms);
}

// 🎯 SIMULACIÓ RODA
function dial(num){
  if(input.length >= 4) return;

  // retard segons número (com roda real)
  let delay = 150 + (parseInt(num) * 60);

  clickSound.currentTime = 0;
  clickSound.play();
  vibrate(20);

  setTimeout(() => {
    input += num;
    screen.textContent = input;

    returnSound.currentTime = 0;
    returnSound.play();
    vibrate(40);
  }, delay);
}

function clearInput(){
  input="";
  screen.textContent="";
}

// 📞 CHECK AMB CONTESTADOR
function speakMessage(text, onEndCallback){
  const msg = new SpeechSynthesisUtterance(text);

  msg.lang = "en-US";
  msg.pitch = 0.6;
  msg.rate = 0.85;
  msg.volume = 1;

  const voices = speechSynthesis.getVoices();
  const preferred = voices.find(v =>
    v.lang.startsWith("en") &&
    (v.name.includes("Google") || v.name.includes("Natural"))
  );

  if(preferred){
    msg.voice = preferred;
  }

  speechSynthesis.speak(msg);

  msg.onend = () => {
    if(onEndCallback) onEndCallback();
  };
}


function checkCode(){
  if(input.length !== 4){
    alert("4 digits!");
    return;
  }

  beepSound.play();

  setTimeout(() => {

    // ✅ CODI CORRECTE
    if(input === "1234"){
      const audioPath = "audio/1234.mp3";

      speakMessage("This is a message from Eleanor Cross", () => {
        player.src = audioPath;
        player.play();
      });

      clearInput();
      return;
    }

    // ❌ CODI INCORRECTE
    speakMessage("Wrong code, please try again");

    clearInput(); // 👉 ARA AQUÍ

  }, 700);
}
</script>

</body>
</html>
